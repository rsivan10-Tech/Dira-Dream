services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://diradream:diradream@postgres:5432/diradream
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: diradream
      POSTGRES_USER: diradream
      POSTGRES_PASSWORD: diradream
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
